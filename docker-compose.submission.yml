# SUBMISSION compose — goes to the `submission` branch as docker-compose.yml.
# Uses PUBLIC prebuilt images (packed.bin is baked into the api image at build).
#
# Topology: round-robin LB (kernel iptables-DNAT, userspace-relay fallback) + 2
# api workers running the per-bucket IVF 5-NN fraud search.
# Total limits: 1.0 CPU, 344MB (cap 1.0 / 350MB). bridge net, port 9999.
services:
  api1:
    image: docker.io/srwalkerb/rinha-api-c:v10
    command: ["/app/packed.bin", "8001"]
    environment:
      - NPROBE=12
    networks: [app]
    # mlock the 115MB index into RAM via an unlimited memlock rlimit — works
    # WITHOUT CAP_IPC_LOCK (the engine forbids cap_add) since RLIMIT_MEMLOCK=inf
    # bypasses the per-mlock cap check.
    ulimits:
      memlock: -1
    deploy:
      resources:
        limits: { cpus: "0.40", memory: "160M" }

  api2:
    image: docker.io/srwalkerb/rinha-api-c:v10
    command: ["/app/packed.bin", "8001"]
    environment:
      - NPROBE=12
    networks: [app]
    ulimits:
      memlock: -1
    deploy:
      resources:
        limits: { cpus: "0.40", memory: "160M" }

  lb:
    # No NET_ADMIN / sysctls (engine forbids them): lb-nft.sh can't program the
    # kernel iptables-DNAT path, so it auto-falls back to the userspace epoll
    # relay (/app/lb). Pure round-robin L4 forwarding, never reads payloads.
    image: docker.io/srwalkerb/rinha-lb-nft:v10
    command: ["9999", "api1", "8001", "api2", "8001"]
    ports:
      - "9999:9999"
    networks: [app]
    depends_on: [api1, api2]
    deploy:
      resources:
        limits: { cpus: "0.20", memory: "24M" }

networks:
  app:
    driver: bridge
