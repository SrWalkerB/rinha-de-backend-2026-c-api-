# SUBMISSION compose — goes to the `submission` branch as docker-compose.yml.
# Uses PUBLIC prebuilt images (packed.bin is baked into the api image at build).
#
# Topology: round-robin LB (userspace epoll relay over Unix domain sockets) + 2
# api workers running the per-bucket IVF 5-NN fraud search. Internal LB->API
# traffic goes over Unix sockets on a shared named volume (no TCP), so the LB
# never touches the network stack for forwarding.
# Total limits: 1.0 CPU, 344MB (cap 1.0 / 350MB). bridge net, port 9999.
#
# The p99 tail is CPU-quota-independent (identical at LB-heavy and API-heavy
# splits), so it is per-request wakeup latency, not compute. v13 images add a
# KEEPWARM_US keep-warm timer that bounds worker idle time to keep the core in a
# shallow C-state (fast wakeup) instead of deep C6 (~100us exit) — see api.c.
# Tune/disable KEEPWARM_US here without rebuilding. Index unchanged → E=0.
services:
  api1:
    image: docker.io/srwalkerb/rinha-api-c:v13
    command: ["/app/packed.bin", "/socks/api1.sock"]
    environment:
      - NPROBE=6
      - KEEPWARM_US=30
    networks: [app]
    volumes:
      - sockets:/socks
    # mlock the 115MB index into RAM via an unlimited memlock rlimit — works
    # WITHOUT CAP_IPC_LOCK (the engine forbids cap_add) since RLIMIT_MEMLOCK=inf
    # bypasses the per-mlock cap check.
    ulimits:
      memlock: -1
    deploy:
      resources:
        limits: { cpus: "0.375", memory: "160M" }

  api2:
    image: docker.io/srwalkerb/rinha-api-c:v13
    command: ["/app/packed.bin", "/socks/api2.sock"]
    environment:
      - NPROBE=6
      - KEEPWARM_US=30
    networks: [app]
    volumes:
      - sockets:/socks
    ulimits:
      memlock: -1
    depends_on: [api1]
    deploy:
      resources:
        limits: { cpus: "0.375", memory: "160M" }

  lb:
    # Internal forwarding is the userspace epoll relay (/app/lb) over the two
    # Unix domain sockets the api workers listen on (shared via the `sockets`
    # named volume). Pure round-robin L4 forwarding, never reads payloads.
    image: docker.io/srwalkerb/rinha-lb-nft:v13
    command: ["9999", "/socks/api1.sock", "/socks/api2.sock"]
    environment:
      - KEEPWARM_US=30
    ports:
      - "9999:9999"
    networks: [app]
    volumes:
      - sockets:/socks
    depends_on: [api1, api2]
    deploy:
      resources:
        limits: { cpus: "0.25", memory: "24M" }

networks:
  app:
    driver: bridge

volumes:
  sockets:
