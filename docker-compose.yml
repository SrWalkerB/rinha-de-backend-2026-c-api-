# Local/main compose — builds images from source.
# Topology: round-robin LB (userspace epoll relay) + 2 api workers.
# Total limits: 1.0 CPU, 344MB (cap 1.0 / 350MB). bridge net, port 9999.
#
# The engine forbids cap_add/sysctls, so we use NO capabilities: the api mlocks
# its index via an unlimited memlock rlimit (no CAP_IPC_LOCK needed), and the LB
# runs the userspace epoll relay (no NET_ADMIN / kernel DNAT). The relay never
# reads payloads — pure round-robin L4 forwarding.
services:
  api1:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: rinha-api-c:local
    command: ["/app/packed.bin", "/socks/api1.sock"]
    environment:
      - NPROBE=6
      - KEEPWARM_US=30
    networks: [app]
    volumes:
      - sockets:/socks
    ulimits:
      memlock: -1
    deploy:
      resources:
        limits: { cpus: "0.375", memory: "160M" }

  api2:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: rinha-api-c:local
    command: ["/app/packed.bin", "/socks/api2.sock"]
    environment:
      - NPROBE=6
      - KEEPWARM_US=30
    networks: [app]
    volumes:
      - sockets:/socks
    ulimits:
      memlock: -1
    depends_on: [api1]
    deploy:
      resources:
        limits: { cpus: "0.375", memory: "160M" }

  lb:
    build:
      context: .
      dockerfile: Dockerfile.lbnft
    image: rinha-lb-nft:local
    command: ["9999", "/socks/api1.sock", "/socks/api2.sock"]
    environment:
      - KEEPWARM_US=30
    ports:
      - "9999:9999"
    networks: [app]
    volumes:
      - sockets:/socks
    depends_on: [api1, api2]
    deploy:
      resources:
        limits: { cpus: "0.25", memory: "24M" }

networks:
  app:
    driver: bridge

volumes:
  sockets:
