# SUBMISSION compose (submission branch). Uses PUBLIC prebuilt images
# (packed.bin baked into the api image at build).
# api/lb pinned to :v7 — NPROBE=192 keeps zero detection errors on the public
# dataset and reduces p99 below the 1ms scoring ceiling in local full k6.
#
# NO cap_add / sysctls (the engine forbids them):
#   - api mlocks its 115MB index via an unlimited memlock rlimit — works without
#     CAP_IPC_LOCK because RLIMIT_MEMLOCK=inf bypasses the per-mlock cap check.
#   - lb runs the userspace epoll relay (lb-nft.sh auto-falls back when it can't
#     program kernel iptables-DNAT). Pure round-robin L4, never reads payloads.
# Topology: 1 LB + 2 api (per-bucket IVF 5-NN, tc75 index).
# Total limits: 1.0 CPU, 344MB (cap 1.0 / 350MB). bridge net, port 9999.
services:
  api1:
    image: docker.io/srwalkerb/rinha-api-c:v7
    command: ["/app/packed.bin", "8001"]
    environment:
      - NPROBE=192
    networks: [app]
    ulimits:
      memlock: -1
    deploy:
      resources:
        limits: { cpus: "0.40", memory: "160M" }

  api2:
    image: docker.io/srwalkerb/rinha-api-c:v7
    command: ["/app/packed.bin", "8001"]
    environment:
      - NPROBE=192
    networks: [app]
    ulimits:
      memlock: -1
    deploy:
      resources:
        limits: { cpus: "0.40", memory: "160M" }

  lb:
    image: docker.io/srwalkerb/rinha-lb-nft:v7
    command: ["9999", "api1", "8001", "api2", "8001"]
    ports:
      - "9999:9999"
    networks: [app]
    depends_on: [api1, api2]
    deploy:
      resources:
        limits: { cpus: "0.20", memory: "24M" }

networks:
  app:
    driver: bridge
