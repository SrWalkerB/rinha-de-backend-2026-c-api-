# SUBMISSION compose (submission branch). Uses PUBLIC prebuilt images
# (packed.bin baked into the api image at build).
# api/lb pinned to :v13 — NPROBE=6 adaptive confirmation; Unix-socket LB<->API.
#
# The official p99 (~1.46ms) was identical at LB-heavy and API-heavy CPU splits,
# proving the tail is per-request wakeup latency, not compute (kNN is ~tens of
# us). v13 adds a KEEPWARM_US keep-warm timer that bounds worker idle time so the
# core stays in a shallow C-state (fast wakeup) instead of deep C6 (~100us exit).
# Sweep/disable KEEPWARM_US below without rebuilding. Index unchanged → E=0.
#
# NO cap_add / sysctls (the engine forbids them): api mlocks its 115MB index via
# an unlimited memlock rlimit (RLIMIT_MEMLOCK=inf bypasses the per-mlock cap).
# Topology: 1 LB + 2 api (per-bucket IVF 5-NN, tc75 index). CPU split
# 0.375/0.375/0.25 (proven p99-neutral; kept for headroom).
# Total limits: 1.0 CPU, 344MB (cap 1.0 / 350MB). bridge net, port 9999.
services:
  api1:
    image: docker.io/srwalkerb/rinha-api-c:v13
    command: ["/app/packed.bin", "/socks/api1.sock"]
    environment:
      - NPROBE=6
      - KEEPWARM_US=80
    networks: [app]
    volumes:
      - sockets:/socks
    ulimits:
      memlock: -1
    deploy:
      resources:
        limits: { cpus: "0.375", memory: "160M" }

  api2:
    image: docker.io/srwalkerb/rinha-api-c:v13
    command: ["/app/packed.bin", "/socks/api2.sock"]
    environment:
      - NPROBE=6
      - KEEPWARM_US=80
    networks: [app]
    volumes:
      - sockets:/socks
    ulimits:
      memlock: -1
    depends_on: [api1]
    deploy:
      resources:
        limits: { cpus: "0.375", memory: "160M" }

  lb:
    image: docker.io/srwalkerb/rinha-lb-nft:v13
    command: ["9999", "/socks/api1.sock", "/socks/api2.sock"]
    environment:
      - KEEPWARM_US=80
    ports:
      - "9999:9999"
    networks: [app]
    volumes:
      - sockets:/socks
    depends_on: [api1, api2]
    deploy:
      resources:
        limits: { cpus: "0.25", memory: "24M" }

networks:
  app:
    driver: bridge

volumes:
  sockets:
