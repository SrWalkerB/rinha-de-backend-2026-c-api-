# SUBMISSION compose (submission branch). Uses PUBLIC prebuilt images
# (packed.bin baked into the api image at build). Pinned to immutable :v3 tags.
#
# Topology: round-robin LB (kernel iptables-DNAT, userspace-relay fallback) + 2
# api workers running the per-bucket IVF 5-NN fraud search (tc75 index).
# Total limits: 1.0 CPU, 344MB (cap 1.0 / 350MB). bridge net, port 9999.
services:
  api1:
    image: docker.io/srwalkerb/rinha-api-c:v3
    command: ["/app/packed.bin", "8001"]
    environment:
      - NPROBE=256
    networks: [app]
    cap_add: [IPC_LOCK]
    ulimits:
      memlock: -1
    deploy:
      resources:
        limits: { cpus: "0.40", memory: "160M" }

  api2:
    image: docker.io/srwalkerb/rinha-api-c:v3
    command: ["/app/packed.bin", "8001"]
    environment:
      - NPROBE=256
    networks: [app]
    cap_add: [IPC_LOCK]
    ulimits:
      memlock: -1
    deploy:
      resources:
        limits: { cpus: "0.40", memory: "160M" }

  lb:
    image: docker.io/srwalkerb/rinha-lb-nft:v3
    command: ["9999", "api1", "8001", "api2", "8001"]
    cap_add: [NET_ADMIN]
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "9999:9999"
    networks: [app]
    depends_on: [api1, api2]
    deploy:
      resources:
        limits: { cpus: "0.20", memory: "24M" }

networks:
  app:
    driver: bridge
