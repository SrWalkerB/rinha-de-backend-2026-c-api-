# SUBMISSION compose — goes to the `submission` branch as docker-compose.yml.
# Uses PUBLIC prebuilt images (packed.bin is baked into the api image at build).
# Replace srwalkerb with your registry namespace before pushing.
# Total limits: 1.0 CPU, 324MB (cap 1.0 / 350MB). bridge net, port 9999.
services:
  api1:
    image: docker.io/srwalkerb/rinha-api-c:latest
    command: ["/app/packed.bin", "8001"]
    networks: [app]
    deploy:
      resources:
        limits: { cpus: "0.45", memory: "160M" }

  api2:
    image: docker.io/srwalkerb/rinha-api-c:latest
    command: ["/app/packed.bin", "8001"]
    networks: [app]
    deploy:
      resources:
        limits: { cpus: "0.45", memory: "160M" }

  lb:
    image: docker.io/srwalkerb/rinha-lb-c:latest
    command: ["9999", "api1", "8001", "api2", "8001"]
    ports:
      - "9999:9999"
    networks: [app]
    depends_on: [api1, api2]
    deploy:
      resources:
        limits: { cpus: "0.10", memory: "24M" }

networks:
  app:
    driver: bridge
