# Local/main compose — builds images from source.
# Topology: round-robin LB (kernel DNAT, userspace-relay fallback) + 2 api workers.
# Total limits: 1.0 CPU, 344MB (cap 1.0 / 350MB). bridge net, port 9999.
#
# The LB forwards in the kernel (iptables DNAT + conntrack) when NET_ADMIN is
# available, costing ~no cgroup CPU; otherwise it falls back to the userspace
# epoll relay. Either way it never inspects payloads. The freed budget goes to
# the two API workers (0.40 each), which run the per-bucket IVF 5-NN search.
services:
  api1:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: rinha-api-c:local
    command: ["/app/packed.bin", "8001"]
    environment:
      - NPROBE=${NPROBE:-64}
    networks: [app]
    cap_add: [IPC_LOCK]
    ulimits:
      memlock: -1
    deploy:
      resources:
        limits: { cpus: "0.40", memory: "160M" }

  api2:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: rinha-api-c:local
    command: ["/app/packed.bin", "8001"]
    environment:
      - NPROBE=${NPROBE:-64}
    networks: [app]
    cap_add: [IPC_LOCK]
    ulimits:
      memlock: -1
    depends_on: [api1]
    deploy:
      resources:
        limits: { cpus: "0.40", memory: "160M" }

  lb:
    build:
      context: .
      dockerfile: Dockerfile.lbnft
    image: rinha-lb-nft:local
    command: ["9999", "api1", "8001", "api2", "8001"]
    cap_add: [NET_ADMIN]
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "9999:9999"
    networks: [app]
    depends_on: [api1, api2]
    deploy:
      resources:
        limits: { cpus: "0.20", memory: "24M" }

networks:
  app:
    driver: bridge
